<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: teal;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
        }

        /* Contenedor de dos en dos */
        .contenedor-proyectos {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Esto fuerza el formato de dos en dos */
            gap: 20px; /* Espacio entre las tarjetas */
            max-width: 800px;
            width: 100%;
        }

        /* Estilo de cada tarjeta (similar a tu producto-card) */
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
            background-color: lightseagreen;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Mis Proyectos Web</h1>

    <div class="contenedor-proyectos">
        <a href="./dia3posiciones/dia3posiciones.html" class="card">Día 3: Posiciones</a>
        <a href="./dia6practica/dia6practica.html" class="card">Día 6: Práctica</a>
        <a href="./dia7pricing/dia7pricing.html" class="card">Día 7: Pricing</a>
        <a href="./dia8website/dia8website.html" class="card">Día 8: Website</a>
        <a href="./proyectofinal/proyectofinal.html" class="card">Proyecto Final</a>
        <a href="./pruebafinal/pruebafinal.html" class="card">Prueba Final</a>
    </div>

</body>
</html>
